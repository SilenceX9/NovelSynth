<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 网文脱水机</title>
<style>
    :root {
      --bg: #f9f7f3;
      --surface: #fff;
      --border: #e8e4dd;
      --text: #2c2416;
      --text-secondary: #8c8478;
      --text-muted: #b8b0a4;
      --accent: #8b5e3c;
      --accent-light: #f5efe8;
      --blue: #4a6fa5;
      --blue-light: #e8f0fa;
      --green: #5b8c5a;
      --green-light: #e8f5e8;
      --amber: #b8860b;
      --amber-light: #fef9ee;
      --red: #c4554d;
      --red-light: #fdf0ef;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }

    .header { text-align: center; padding: 44px 0 36px; position: relative; }
    .header-icon { display: block; font-size: 42px; margin-bottom: 12px; line-height: 1; }
    .header h1 {
      font-size: 26px; font-weight: 700; color: var(--text);
      letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .header p { color: var(--text-secondary); font-size: 14px; }
    .header-actions { position: absolute; top: 48px; right: 0; }

    .btn {
      padding: 7px 16px; border-radius: var(--radius-sm); border: none;
      font-size: 13px; cursor: pointer; font-weight: 500; font-family: inherit;
      transition: all 0.18s; display: inline-flex; align-items: center; gap: 5px;
      white-space: nowrap; text-decoration: none; line-height: 1.4;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #7a5232; }
    .btn-secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #f0ece6; color: var(--text); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: rgba(0,0,0,0.04); color: var(--text); }
    .btn-danger { background: var(--red-light); color: var(--red); }
    .btn-danger:hover { background: #fbe5e3; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .card {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 16px; font-weight: 600; margin-bottom: 16px;
      color: var(--text); display: flex; align-items: center; gap: 8px;
    }

    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius-md);
      padding: 36px 24px; text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative; background: #fcfbf8;
    }
    .upload-area:hover { border-color: var(--accent); background: var(--accent-light); }
    .upload-area.dragover { border-color: var(--accent); background: var(--accent-light); }
    .upload-area .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.6; line-height: 1; }
    .upload-area .label { color: var(--text-secondary); font-size: 14px; }
    .upload-area .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; transition: all 0.15s;
      border-bottom: 1px solid #f4f1eb; gap: 12px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { padding-left: 4px; }
    .history-info { flex: 1; min-width: 0; }
    .history-info .title {
      font-weight: 600; font-size: 15px; color: var(--text);
      margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 99px;
      font-size: 11px; font-weight: 500; margin-right: 4px; letter-spacing: 0.2px;
    }
    .badge-indexed { background: var(--blue-light); color: var(--blue); }
    .badge-dehydrated { background: var(--green-light); color: var(--green); }
    .badge-pending { background: var(--amber-light); color: var(--amber); }
    .badge-running { background: var(--blue-light); color: var(--blue); }
    .badge-paused { background: var(--amber-light); color: var(--amber); }

    .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; line-height: 1; }
    .empty-state p { font-size: 14px; }

    .status { font-size: 13px; margin-top: 10px; color: var(--text-secondary); }
    .status.success { color: var(--green); }
    .status.error { color: var(--red); }

    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 12px 0; color: var(--text-muted); font-size: 13px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e8e4dd; }

    .modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: var(--surface); border-radius: var(--radius-lg); width: 440px;
      max-width: 92vw; box-shadow: var(--shadow-lg); overflow: hidden;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-header {
      padding: 20px 24px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .close-btn {
      background: none; border: none; font-size: 18px; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 50%;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: #f0ece6; color: var(--text); }
    .modal-body { padding: 20px 24px 24px; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
      background: #fcfbf8; transition: border-color 0.15s; color: var(--text);
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); background: #fff; }

    .range-row {
      display: flex; gap: 10px; align-items: end;
      padding: 14px 16px; background: #fcfbf8; border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .range-row label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .range-row input {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; font-family: inherit; text-align: center; background: #fff;
    }
    .range-row input:focus { outline: none; border-color: var(--accent); }
    .chapter-list-preview {
      max-height: 220px; overflow-y: auto; font-size: 13px;
      color: var(--text-secondary); margin: 12px 0;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
    }
    .chapter-list-preview > div { padding: 6px 12px; border-bottom: 1px solid #f8f6f1; }
    .chapter-list-preview > div:last-child { border-bottom: none; }

    @media (max-width: 600px) {
      .container { padding: 16px 12px 40px; }
      .header { padding: 28px 0 20px; }
      .header h1 { font-size: 22px; }
      .header-actions { position: static; margin-top: 12px; display: flex; justify-content: center; }
      .history-item { flex-direction: column; align-items: flex-start; gap: 8px; }
      .history-actions { align-self: flex-end; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-actions">
      <button onclick="openSettings()" class="btn btn-ghost">设置</button>
    </div>
    <span class="header-icon">📖</span>
    <h1>AI 网文脱水机</h1>
    <p>上传小说，智能脱水，只留主线精华</p>
  </div>

  <!-- History -->
  <div class="card">
    <h2>历史记录</h2>
    <div id="history-list"></div>
  </div>

  <div class="divider">或</div>

  <!-- Upload -->
  <div class="card">
    <h2>上传新小说</h2>
    <div class="upload-area" id="upload-area">
      <div class="icon">📖</div>
      <div class="label">拖拽文件到此处，或点击选择</div>
      <div class="hint">支持 .txt 和 .epub 文件</div>
      <input type="file" id="file-input" accept=".txt,.epub" style="display:none">
    </div>
    <div id="upload-status" class="status"></div>

    <div style="display:flex;align-items:center;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text-muted)">导出 EPUB 章节范围：</span>
      <button onclick="document.getElementById('epub-tool-input').click()" class="btn btn-secondary btn-sm">选择 EPUB 导出章节</button>
      <input type="file" id="epub-tool-input" accept=".epub" style="display:none" onchange="previewEpubTool(this)">
    </div>
  </div>
</div>

<!-- EPUB Preview Tool Modal -->
<div id="epub-tool-modal" class="modal" style="display:none">
  <div class="modal-content" style="width:520px;max-height:85vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <h3>EPUB 章节导出</h3>
      <button onclick="closeEpubTool()" class="close-btn">&times;</button>
    </div>
    <div class="modal-body" style="overflow-y:auto;flex:1" id="epub-tool-body">
    </div>
  </div>
</div>

<!-- Chapter Preview Modal (EPUB) -->
<div id="chapter-preview-modal" class="modal" style="display:none">
  <div class="modal-content" style="width:560px;max-height:90vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <h3>📖 章节预览与选择</h3>
      <button onclick="closeChapterPreview()" class="close-btn">&times;</button>
    </div>
    <div class="modal-body" style="overflow-y:auto;flex:1">
      <div id="chapter-preview-info" style="margin-bottom:14px"></div>
      <div id="chapter-preview-range" style="margin-bottom:16px;padding:16px;background:#f8f7ff;border-radius:10px">
        <p style="font-size:14px;font-weight:600;margin-bottom:10px">选择处理范围</p>
        <div style="display:flex;gap:12px;align-items:end">
          <div style="flex:1">
            <label style="font-size:12px;color:#888">起始章节</label>
            <input type="number" id="chapter-start" min="1" value="1" style="width:100%;padding:8px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px">
          </div>
          <div style="flex:1">
            <label style="font-size:12px;color:#888">结束章节</label>
            <input type="number" id="chapter-end" min="1" value="100" style="width:100%;padding:8px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px">
          </div>
        </div>
        <p id="chapter-cost-estimate" style="font-size:12px;color:#888;margin-top:10px"></p>
      </div>
      <div id="chapter-preview-list" class="chapter-list-preview"></div>
      <div style="display:flex;gap:10px">
        <button onclick="startProcessing()" class="btn btn-primary" style="flex:1;justify-content:center;padding:12px">开始处理</button>
        <button onclick="closeChapterPreview()" class="btn btn-secondary" style="flex:1;justify-content:center;padding:12px">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal" style="display:none">
  <div class="modal-content">
    <div class="modal-header">
      <h3>LLM 配置</h3>
      <button onclick="closeSettings()" class="close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>平台</label>
        <select id="llm-provider" onchange="onProviderChange()">
          <option value="openai">OpenAI (GPT-4o)</option>
          <option value="gemini">Google Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="dashscope">阿里百炼 / Coding Plan</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="form-group">
        <label>API 地址</label>
        <input type="text" id="llm-base-url" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input type="text" id="llm-model" placeholder="模型名称">
        <datalist id="model-suggestions"></datalist>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="llm-api-key" placeholder="sk-...">
      </div>
      <button onclick="saveLLMConfig()" class="btn btn-primary" style="width:100%">保存</button>
      <div id="settings-status" class="status"></div>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div id="export-modal" class="modal" style="display:none">
  <div class="modal-content" style="width:360px">
    <div class="modal-header">
      <h3>导出脱水版</h3>
      <button onclick="closeExportModal()" class="close-btn">&times;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
      <p style="font-size:14px;color:#666;margin:0" id="export-title"></p>
      <button onclick="doExport('txt')" class="btn btn-secondary" style="justify-content:center;padding:14px 18px">
        <span>📄</span>
        <span style="flex:1;text-align:left">
          <span style="display:block;font-weight:600">TXT 纯文本</span>
          <span style="font-size:12px;color:#999">脱水后的纯文本，适合任何阅读器</span>
        </span>
      </button>
      <button onclick="doExport('epub')" class="btn btn-secondary" style="justify-content:center;padding:14px 18px">
        <span>📚</span>
        <span style="flex:1;text-align:left">
          <span style="display:block;font-weight:600">EPUB 电子书</span>
          <span style="font-size:12px;color:#999">带章节目录，适合 Apple Books / Kindle</span>
        </span>
      </button>
      <div id="export-status" class="status"></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
let bookId = null;
let llmProviders = {};
let epubToolFile = null;

// History
async function loadHistory() {
  const res = await fetch('/api/books/with-tasks');
  const books = await res.json();
  const el = document.getElementById('history-list');

  if (books.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📚</div><p>暂无记录，上传一本小说开始吧</p></div>';
    return;
  }

  el.innerHTML = books.map(b => {
    const badges = [];

    // Index status
    if (b.indexed || b.index_status === 'done') {
      badges.push('<span class="badge badge-indexed">索引完成</span>');
    } else if (b.index_status === 'running') {
      badges.push('<span class="badge badge-running">索引中</span>');
    } else if (b.index_status === 'paused') {
      badges.push('<span class="badge badge-paused">索引暂停</span>');
    }

    // Dehydrate status
    if (b.dehydrated || b.dehydrate_status === 'done') {
      badges.push('<span class="badge badge-dehydrated">脱水完成</span>');
    } else if (b.dehydrate_status === 'running') {
      badges.push('<span class="badge badge-running">脱水中</span>');
    } else if (b.dehydrate_status === 'paused') {
      badges.push('<span class="badge badge-paused">脱水暂停</span>');
    } else if (b.indexed && !b.dehydrated) {
      badges.push('<span class="badge badge-pending">待脱水</span>');
    }

    if (!b.indexed && !b.index_status) {
      badges.push('<span class="badge badge-pending">待处理</span>');
    }

    // Actions
    const actions = [];
    if (b.dehydrated || b.dehydrate_status === 'done') {
      actions.push(`<a href="/read.html?book_id=${b.book_id}" target="_blank" class="btn btn-sm btn-primary">阅读</a>`);
      actions.push(`<button onclick="openExportModal('${b.book_id}', '${escHtml(b.title)}')" class="btn btn-sm btn-secondary">导出</button>`);
    }
    if (!b.indexed && !b.index_status && !(b.dehydrated || b.dehydrate_status === 'done')) {
      // Not processed yet — show combined action
      actions.push(`<a href="/task.html?book_id=${b.book_id}" class="btn btn-sm btn-primary">一键处理</a>`);
    }
    actions.push(`<a href="/task.html?book_id=${b.book_id}" class="btn btn-sm btn-secondary">查看</a>`);
    actions.push(`<button onclick="deleteBook('${b.book_id}', '${escHtml(b.title)}')" class="btn btn-sm btn-danger">删除</button>`);

    return `<div class="history-item">
      <div class="history-info">
        <div class="title">${escHtml(b.title)}</div>
        <div>${badges.join('')}</div>
      </div>
      <div class="history-actions">${actions.join('')}</div>
    </div>`;
  }).join('');
}

async function deleteBook(id, title) {
  if (!confirm(`确定删除「${title}」？`)) return;
  await fetch(`/api/books/${id}`, { method: 'DELETE' });
  await loadHistory();
  if (bookId === id) {
    bookId = null;
  }
}

// Upload - handle TXT and EPUB
async function uploadFile() {
  const file = document.getElementById('file-input').files[0];
  if (!file) return alert('请先选择文件');

  // Reset file input so same file can be selected again
  const fileInput = document.getElementById('file-input');

  const ext = file.name.split('.').pop().toLowerCase();
  const fd = new FormData();
  fd.append('file', file);
  setStatus('upload-status', '上传中...');

  try {
    const res = await fetch('/api/books/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '上传失败');
    bookId = data.book_id;
    setBookId(bookId);

    // Reset file input after successful upload
    fileInput.value = '';

    if (data.format === 'epub' || data.format === 'txt') {
      // Both: show chapter preview before processing
      setStatus('upload-status', `上传成功！共 ${data.new_chapters} 章，正在加载章节列表...`, 'success');
      await openChapterPreview(bookId, data.new_chapters, file.name);
    }
  } catch (e) {
    setStatus('upload-status', `上传失败: ${e.message}`, 'error');
    fileInput.value = '';
  }
}

// Settings
async function loadSettings() {
  const res = await fetch('/api/settings/llm');
  const data = await res.json();
  llmProviders = data.providers;
  const cfg = data.current;
  document.getElementById('llm-provider').value = cfg.provider || 'openai';
  document.getElementById('llm-base-url').value = cfg.base_url || '';
  document.getElementById('llm-model').value = cfg.model || '';
  document.getElementById('llm-api-key').value = cfg.api_key || '';
  onProviderChange();
}

function onProviderChange() {
  const provider = document.getElementById('llm-provider').value;
  const p = llmProviders[provider];
  if (p) {
    document.getElementById('llm-base-url').value = p.base_url;
    const datalist = document.getElementById('model-suggestions');
    datalist.innerHTML = p.models.map(m => `<option value="${m}">`).join('');
    document.getElementById('llm-model').setAttribute('list', 'model-suggestions');
    const currentModel = document.getElementById('llm-model').value;
    if (!currentModel || !p.models.includes(currentModel)) {
      document.getElementById('llm-model').value = p.models[0] || '';
    }
  }
}

function openSettings() {
  document.getElementById('settings-modal').style.display = 'flex';
  loadSettings();
}
function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}

async function saveLLMConfig() {
  const data = {
    provider: document.getElementById('llm-provider').value,
    base_url: document.getElementById('llm-base-url').value,
    model: document.getElementById('llm-model').value,
    api_key: document.getElementById('llm-api-key').value,
  };
  const res = await fetch('/api/settings/llm', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  const result = await res.json();
  document.getElementById('settings-status').textContent = result.status === 'ok' ? '保存成功！' : '保存失败';
}

document.getElementById('settings-modal').onclick = function(e) {
  if (e.target === this) closeSettings();
};

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Export
let exportBookId = null;

function openExportModal(id, title) {
  exportBookId = id;
  document.getElementById('export-title').textContent = `《${title}》`;
  document.getElementById('export-status').textContent = '';
  document.getElementById('export-modal').style.display = 'flex';
}

function closeExportModal() {
  document.getElementById('export-modal').style.display = 'none';
}

function doExport(format) {
  if (!exportBookId) return;
  const url = `/api/dehydrate/${exportBookId}/export/${format}`;
  const a = document.createElement('a');
  a.href = url;
  a.click();
  setStatus('export-status', '已开始下载', 'success');
  setTimeout(closeExportModal, 600);
}

document.getElementById('export-modal').onclick = function(e) {
  if (e.target === this) closeExportModal();
};

// Upload area drag effects
const uploadArea = document.getElementById('upload-area');
if (uploadArea) {
  uploadArea.addEventListener('click', () => {
    document.getElementById('file-input').click();
  });
  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault(); uploadArea.classList.remove('dragover');
    document.getElementById('file-input').files = e.dataTransfer.files;
    uploadFile();
  });
}

// Also trigger upload when file is selected via click
document.getElementById('file-input').addEventListener('change', () => {
  if (document.getElementById('file-input').files.length > 0) {
    uploadFile();
  }
});

bookId = getBookId();

// Chapter Preview (EPUB)
let pendingBookId = null;
let previewChapters = [];

async function openChapterPreview(bookId, totalChapters, filename) {
  pendingBookId = bookId;
  document.getElementById('chapter-preview-modal').style.display = 'flex';

  try {
    // Fetch chapter list
    const res = await fetch(`/api/books/${bookId}/chapters`);
    if (!res.ok) throw new Error('加载章节失败');
    const data = await res.json();
    previewChapters = data.chapters;

    if (!previewChapters || previewChapters.length === 0) {
      // No chapters found — proceed directly with raw file
      document.getElementById('chapter-preview-info').innerHTML =
        `<p style="font-size:14px"><strong>${escHtml(filename.replace(/\.\w+$/, ''))}</strong></p>
         <p style="font-size:13px;color:#888;margin-top:4px">未能识别章节，将全文作为单章处理</p>`;
      document.getElementById('chapter-preview-range').style.display = 'none';
      document.getElementById('chapter-preview-list').style.display = 'none';
      return;
    }

    // Set range
    document.getElementById('chapter-start').value = 1;
    document.getElementById('chapter-start').max = data.total_chapters;
    document.getElementById('chapter-end').value = Math.min(100, data.total_chapters);
    document.getElementById('chapter-end').max = data.total_chapters;

    // Info
    document.getElementById('chapter-preview-info').innerHTML =
      `<p style="font-size:14px"><strong>${escHtml(filename.replace(/\.\w+$/, ''))}</strong></p>
       <p style="font-size:13px;color:#888;margin-top:4px">共 ${data.total_chapters} 章正文</p>`;

    // Show first few chapters
    renderChapterPreviewList(data.total_chapters, 1, Math.min(100, data.total_chapters));
    updateCostEstimate(data.total_chapters, 1, Math.min(100, data.total_chapters));

    // Wire up range change
    document.getElementById('chapter-start').onchange = onChapterRangeChange;
    document.getElementById('chapter-end').onchange = onChapterRangeChange;
  } catch (e) {
    // If chapter fetch fails, just proceed with all content
    document.getElementById('chapter-preview-info').innerHTML =
      `<p style="font-size:14px"><strong>${escHtml(filename.replace(/\.\w+$/, ''))}</strong></p>
       <p style="font-size:13px;color:#888;margin-top:4px">章节列表加载失败，将全文处理</p>`;
    document.getElementById('chapter-preview-range').style.display = 'none';
    document.getElementById('chapter-preview-list').style.display = 'none';
  }
}

function onChapterRangeChange() {
  const total = previewChapters.length;
  let start = parseInt(document.getElementById('chapter-start').value) || 1;
  let end = parseInt(document.getElementById('chapter-end').value) || total;
  if (start < 1) start = 1;
  if (end > total) end = total;
  if (start > end) end = start;
  renderChapterPreviewList(total, start, end);
  updateCostEstimate(total, start, end);
}

function renderChapterPreviewList(total, start, end) {
  const el = document.getElementById('chapter-preview-list');
  const count = end - start + 1;
  const show = previewChapters.slice(start - 1, end);
  let html = `<p style="margin-bottom:8px">第 ${start}-${end} 章（共 ${count} 章）：</p>`;
  html += '<div style="max-height:200px;overflow-y:auto">';
  for (const ch of show.slice(0, 20)) {
    html += `<div style="padding:4px 0;border-bottom:1px solid #f0f0f0">第${ch.number}章 ${escHtml(ch.title)}</div>`;
  }
  if (show.length > 20) {
    html += `<div style="padding:8px;color:#bbb">... 还有 ${show.length - 20} 章</div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function updateCostEstimate(total, start, end) {
  const count = end - start + 1;
  // Rough estimate: ~150 tokens/chapter for indexing, ~400 tokens/chapter for dehydration
  const indexTokens = count * 150;
  const dehydrateTokens = count * 400;
  const totalTokens = indexTokens + dehydrateTokens;
  const totalK = totalTokens / 1000;
  // Rough cost at GPT-4o rate: ~$2.50/1M input tokens
  const costUSD = (totalTokens / 1_000_000) * 2.5;
  const costCNY = costUSD * 7.2;

  document.getElementById('chapter-cost-estimate').innerHTML =
    `预计消耗：<strong>${totalK.toFixed(0)}K tokens</strong>（索引 ~${(indexTokens/1000).toFixed(0)}K + 脱水 ~${(dehydrateTokens/1000).toFixed(0)}K）` +
    (costCNY > 0 ? `，约 ¥${costCNY.toFixed(1)}` : '');
}

function closeChapterPreview() {
  document.getElementById('chapter-preview-modal').style.display = 'none';
  pendingBookId = null;
}

async function startProcessing() {
  if (!pendingBookId) return;
  const bookId = pendingBookId; // Save before closeChapterPreview sets it to null
  const start = parseInt(document.getElementById('chapter-start').value) || 1;
  const end = parseInt(document.getElementById('chapter-end').value) || (previewChapters.length || 100);

  closeChapterPreview();

  // Show immediate feedback
  setStatus('upload-status', '正在启动处理...', 'success');

  try {
    const res = await fetch(`/api/dehydrate/${bookId}/index-and-dehydrate?start_chapter=${start}&end_chapter=${end}`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || '启动失败');
    }
    setStatus('upload-status', '已启动！索引完成后将自动脱水', 'success');
    setTimeout(() => {
      window.location.href = `/task.html?book_id=${bookId}&start=${start}&end=${end}`;
    }, 800);
  } catch (e) {
    setStatus('upload-status', `启动失败: ${e.message}`, 'error');
  }
}

document.getElementById('chapter-preview-modal').onclick = function(e) {
  if (e.target === this) closeChapterPreview();
};

// EPUB Tool: preview chapter stats + export range
async function previewEpubTool(input) {
  const file = input.files[0];
  if (!file) return;

  epubToolFile = file;

  const modal = document.getElementById('epub-tool-modal');
  const body = document.getElementById('epub-tool-body');
  modal.style.display = 'flex';
  body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">分析中...</div>';

  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/books/preview-epub', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).detail || '分析失败');
    const data = await res.json();

    const total = data.real_chapters;
    const defaultEnd = Math.min(50, total);

    let html = '<div style="margin-bottom:16px">';
    html += '<p style="font-weight:600;font-size:15px;color:var(--text);margin-bottom:6px">' + escHtml(data.filename) + '</p>';
    html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px">';
    html += '<span class="badge badge-dehydrated">' + data.real_chapters + ' 章正文</span>';
    if (data.noise_count > 0) {
      html += '<span class="badge badge-pending">' + data.noise_count + ' 章噪声（自动跳过）</span>';
    }
    html += '</div></div>';

    if (data.noise_titles && data.noise_titles.length > 0) {
      html += '<details style="margin-bottom:14px;font-size:12px;color:var(--text-secondary)">';
      html += '<summary style="cursor:pointer;color:var(--amber);font-weight:600">已识别噪声章节（' + data.noise_titles.length + ' 章）</summary>';
      data.noise_titles.forEach(t => {
        html += '<div style="padding:2px 0 2px 12px">' + escHtml(t) + '</div>';
      });
      html += '</details>';
    }

    // Range selection
    html += '<div class="range-row" style="margin-bottom:16px">';
    html += '<div style="flex:1"><label>起始章节</label><input type="number" id="epub-start" min="1" max="' + total + '" value="1"></div>';
    html += '<div style="flex:1"><label>结束章节</label><input type="number" id="epub-end" min="1" max="' + total + '" value="' + defaultEnd + '"></div>';
    html += '</div>';

    // Chapter preview
    if (data.preview && data.preview.length > 0) {
      html += '<p style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px">章节预览（前 ' + Math.min(data.preview.length, 10) + ' 章）：</p>';
      html += '<div class="chapter-list-preview" style="max-height:160px;margin-bottom:16px">';
      data.preview.slice(0, 10).forEach(ch => {
        html += '<div>' + escHtml(ch.title) + ' <span style="color:var(--text-muted);font-size:11px">' + ch.char_count.toLocaleString() + ' 字</span></div>';
      });
      html += '</div>';
    }

    // Download buttons
    html += '<div style="display:flex;gap:10px">';
    html += '<button onclick="downloadExtracted(\'epub\')" class="btn btn-primary" style="flex:1;justify-content:center;padding:12px">导出 EPUB</button>';
    html += '<button onclick="downloadExtracted(\'txt\')" class="btn btn-secondary" style="flex:1;justify-content:center;padding:12px">导出 TXT</button>';
    html += '</div>';
    html += '<button onclick="closeEpubTool()" class="btn btn-ghost" style="width:100%;margin-top:8px;justify-content:center">关闭</button>';

    body.innerHTML = html;

    // Wire up range inputs
    document.getElementById('epub-start').onchange = function() {
      const s = parseInt(this.value) || 1;
      const e = parseInt(document.getElementById('epub-end').value) || total;
      if (s > e) document.getElementById('epub-end').value = s;
    };
    document.getElementById('epub-end').onchange = function() {
      const e = parseInt(this.value) || total;
      const s = parseInt(document.getElementById('epub-start').value) || 1;
      if (e < s) document.getElementById('epub-start').value = e;
    };
  } catch(e) {
    body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">分析失败：' + escHtml(e.message) + '<br><button onclick="closeEpubTool()" class="btn btn-ghost btn-sm" style="margin-top:12px">关闭</button></div>';
  }

  input.value = '';
}

async function downloadExtracted(format) {
  if (!epubToolFile) return;

  const start = parseInt(document.getElementById('epub-start').value) || 1;
  const end = parseInt(document.getElementById('epub-end').value) || 1;

  const fd = new FormData();
  fd.append('file', epubToolFile);
  fd.append('start_chapter', start);
  fd.append('end_chapter', end);
  fd.append('format', format);

  const res = await fetch('/api/books/extract-epub', { method: 'POST', body: fd });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    alert('导出失败：' + (err.detail || res.statusText));
    return;
  }

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ext = format === 'epub' ? 'epub' : 'txt';
  const baseName = epubToolFile.name.replace(/\.\w+$/, '');
  a.download = baseName + '_' + start + '-' + end + '.' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function closeEpubTool() {
  document.getElementById('epub-tool-modal').style.display = 'none';
  epubToolFile = null;
}

document.getElementById('epub-tool-modal').onclick = function(e) {
  if (e.target === this) closeEpubTool();
};

loadHistory();

// Poll for task status updates every 10s on main page
setInterval(loadHistory, 10000);
</script>
