<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 网文脱水机</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="container">
  <div class="header-bar">
    <h1 style="margin:0">AI 网文脱水机</h1>
    <button onclick="openSettings()" class="btn btn-secondary" style="font-size:13px">⚙️ LLM 设置</button>
  </div>
  <p class="subtitle">上传小说 → 自动脱水 → 阅读纯净版</p>

  <div class="card" id="upload-section">
    <h2>上传小说</h2>
    <input type="file" id="file-input" accept=".txt,.epub" class="file-input">
    <button id="upload-btn" class="btn btn-primary">上传</button>
    <div id="upload-status" class="status"></div>
  </div>

  <div class="card" id="index-section" style="display:none">
    <h2>全局索引</h2>
    <button id="index-btn" class="btn btn-primary">开始索引（第一遍通读）</button>
    <div id="index-status" class="status"></div>
    <div id="index-result" class="index-result"></div>
  </div>

  <div class="card" id="dehydrate-section" style="display:none">
    <h2>智能脱水</h2>
    <button id="dehydrate-btn" class="btn btn-primary">开始脱水（第二遍精读）</button>
    <div id="dehydrate-status" class="status"></div>
  </div>

  <div class="card" id="read-section" style="display:none">
    <h2>阅读</h2>
    <a href="/read.html" class="btn btn-primary" id="read-link" target="_blank">打开阅读器</a>
  </div>

  <div class="card" id="context-section" style="display:none">
    <h2>全局上下文</h2>
    <a href="/context.html" class="btn btn-secondary" id="context-link" target="_blank">查看角色/主线/伏笔</a>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal" style="display:none">
  <div class="modal-content">
    <div class="modal-header">
      <h3>LLM 配置</h3>
      <button onclick="closeSettings()" class="close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>平台</label>
        <select id="llm-provider" onchange="onProviderChange()">
          <option value="openai">OpenAI (GPT-4o)</option>
          <option value="gemini">Google Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="dashscope">阿里百炼 / Coding Plan</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="form-group">
        <label>API 地址</label>
        <input type="text" id="llm-base-url" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input type="text" id="llm-model" placeholder="模型名称">
        <datalist id="model-suggestions"></datalist>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="llm-api-key" placeholder="sk-...">
      </div>
      <button onclick="saveLLMConfig()" class="btn btn-primary" style="width:100%">保存</button>
      <div id="settings-status" class="status"></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
let bookId = null;
let llmProviders = {};

async function uploadFile() {
  const file = document.getElementById('file-input').files[0];
  if (!file) return alert('请先选择文件');
  const fd = new FormData();
  fd.append('file', file);
  setStatus('upload-status', '上传中...');
  const res = await fetch('/api/books/upload', { method: 'POST', body: fd });
  const data = await res.json();
  bookId = data.book_id;
  setStatus('upload-status', `上传成功！book_id: ${bookId}`);
  showSection('index-section');
}

async function triggerIndex() {
  setStatus('index-status', '索引中...（可能需要几分钟）');
  const res = await fetch(`/api/index/${bookId}`, { method: 'POST' });
  const data = await res.json();
  if (data.status === 'failed') {
    setStatus('index-status', `索引失败：${data.error}`);
    return;
  }
  setStatus('index-status', '索引完成！');
  renderIndexResult(data.context);
  showSection('dehydrate-section');
  showSection('context-section');
}

async function triggerDehydrate() {
  setStatus('dehydrate-status', '脱水中...（可能需要几分钟）');
  const res = await fetch(`/api/dehydrate/${bookId}`, { method: 'POST' });
  const data = await res.json();
  setStatus('dehydrate-status', '脱水完成！');
  showSection('read-section');
}

function renderIndexResult(ctx) {
  const el = document.getElementById('index-result');
  el.innerHTML = `
    <h3>提取结果</h3>
    <p><b>角色</b>：${ctx.characters.map(c => c.name).join('、')}</p>
    <p><b>主线章节</b>：${ctx.main_plot.length} 条</p>
    <p><b>伏笔</b>：${ctx.foreshadows.map(f => f.description).join('、') || '无'}</p>
    <p><b>关键道具</b>：${ctx.key_items.join('、') || '无'}</p>
  `;
}

// Settings
async function loadSettings() {
  const res = await fetch('/api/settings/ll');
  const data = await res.json();
  llmProviders = data.providers;
  const cfg = data.current;
  document.getElementById('llm-provider').value = cfg.provider || 'openai';
  document.getElementById('llm-base-url').value = cfg.base_url || '';
  document.getElementById('llm-model').value = cfg.model || '';
  document.getElementById('llm-api-key').value = cfg.api_key || '';
  onProviderChange();
}

function onProviderChange() {
  const provider = document.getElementById('llm-provider').value;
  const p = llmProviders[provider];
  if (p) {
    document.getElementById('llm-base-url').value = p.base_url;
    const datalist = document.getElementById('model-suggestions');
    datalist.innerHTML = p.models.map(m => `<option value="${m}">`).join('');
    document.getElementById('llm-model').setAttribute('list', 'model-suggestions');
    if (p.models.length > 0) {
      document.getElementById('llm-model').value = p.models[0];
    }
  }
}

function openSettings() {
  document.getElementById('settings-modal').style.display = 'flex';
  loadSettings();
}

function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}

async function saveLLMConfig() {
  const data = {
    provider: document.getElementById('llm-provider').value,
    base_url: document.getElementById('llm-base-url').value,
    model: document.getElementById('llm-model').value,
    api_key: document.getElementById('llm-api-key').value,
  };
  const res = await fetch('/api/settings/llm', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data),
  });
  const result = await res.json();
  document.getElementById('settings-status').textContent = result.status === 'ok' ? '保存成功！' : '保存失败';
}

// Close modal on outside click
document.getElementById('settings-modal').onclick = function(e) {
  if (e.target === this) closeSettings();
};

document.getElementById('upload-btn').onclick = uploadFile;
document.getElementById('index-btn').onclick = triggerIndex;
document.getElementById('dehydrate-btn').onclick = triggerDehydrate;
</script>
</body>
</html>
