<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阅读器 - AI 网文脱水机</title>
<link rel="stylesheet" href="/app.css">
<style>
.reader-layout { display: flex; gap: 20px; height: calc(100vh - 80px); }
.reader-main { flex: 1; overflow-y: auto; padding: 20px; background: #faf8f5; line-height: 2; font-size: 16px; white-space: pre-wrap; font-family: "Source Han Serif", "Noto Serif SC", serif; }
.reader-sidebar { width: 320px; display: flex; flex-direction: column; border-left: 1px solid #e0e0e0; }
.qa-input { padding: 12px; border-bottom: 1px solid #e0e0e0; }
.qa-input textarea { width: 100%; height: 60px; border: 1px solid #d0d0d0; border-radius: 6px; padding: 8px; resize: none; font-size: 14px; }
.qa-input button { margin-top: 6px; }
.qa-history { flex: 1; overflow-y: auto; padding: 12px; }
.qa-item { margin-bottom: 16px; padding: 10px; background: #f5f5f5; border-radius: 6px; }
.qa-item .question { font-weight: bold; margin-bottom: 6px; }
.qa-item .answer { line-height: 1.7; font-size: 14px; }
.qa-item .source { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<div class="container" style="max-width:100%;padding:0 20px">
  <div class="header-bar">
    <h2 style="margin:0">阅读器</h2>
    <div style="display:flex;gap:8px">
      <button onclick="openSettings()" class="btn btn-secondary" style="font-size:13px">⚙️ LLM</button>
      <a href="/" class="btn btn-secondary" style="font-size:13px">返回首页</a>
    </div>
  </div>
  <div class="reader-layout">
    <div class="reader-main" id="reader-content">
      <p class="placeholder">点击"加载脱水版"开始阅读</p>
      <button onclick="loadDehydrated()" class="btn btn-primary" style="margin:20px auto;display:block">加载脱水版</button>
      <div id="text-body" style="display:none"></div>
    </div>
    <div class="reader-sidebar">
      <div class="qa-input">
        <textarea id="qa-question" placeholder="提问关于这本书的问题..."></textarea>
        <button onclick="askQuestion()" class="btn btn-primary" style="width:100%">提问</button>
      </div>
      <div class="qa-history" id="qa-history"></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
// Settings modal (same as index.html)
let llmProviders = {};
function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; loadSettings(); }
function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
async function loadSettings() {
  const res = await fetch('/api/settings/ll');
  const data = await res.json();
  llmProviders = data.providers;
  const cfg = data.current;
  document.getElementById('llm-provider').value = cfg.provider || 'openai';
  document.getElementById('llm-base-url').value = cfg.base_url || '';
  document.getElementById('llm-model').value = cfg.model || '';
  document.getElementById('llm-api-key').value = cfg.api_key || '';
  onProviderChange();
}
function onProviderChange() {
  const provider = document.getElementById('llm-provider').value;
  const p = llmProviders[provider];
  if (p) {
    document.getElementById('llm-base-url').value = p.base_url;
    document.getElementById('model-suggestions').innerHTML = p.models.map(m => `<option value="${m}">`).join('');
    document.getElementById('llm-model').setAttribute('list', 'model-suggestions');
    if (p.models.length > 0) document.getElementById('llm-model').value = p.models[0];
  }
}
async function saveLLMConfig() {
  const data = { provider: document.getElementById('llm-provider').value, base_url: document.getElementById('llm-base-url').value, model: document.getElementById('llm-model').value, api_key: document.getElementById('llm-api-key').value };
  const res = await fetch('/api/settings/llm', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
  const result = await res.json();
  document.getElementById('settings-status').textContent = result.status === 'ok' ? '保存成功！' : '保存失败';
}
document.getElementById('settings-modal').onclick = function(e) { if (e.target === this) closeSettings(); };
</script>

<!-- Settings Modal -->
<div id="settings-modal" class="modal" style="display:none">
  <div class="modal-content">
    <div class="modal-header"><h3>LLM 配置</h3><button onclick="closeSettings()" class="close-btn">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>平台</label><select id="llm-provider" onchange="onProviderChange()"><option value="openai">OpenAI (GPT-4o)</option><option value="gemini">Google Gemini</option><option value="deepseek">DeepSeek</option><option value="dashscope">阿里百炼 / Coding Plan</option><option value="custom">自定义</option></select></div>
      <div class="form-group"><label>API 地址</label><input type="text" id="llm-base-url" placeholder="https://..."><datalist id="model-suggestions"></datalist></div>
      <div class="form-group"><label>模型</label><input type="text" id="llm-model" placeholder="模型名称"></div>
      <div class="form-group"><label>API Key</label><input type="password" id="llm-api-key" placeholder="sk-..."></div>
      <button onclick="saveLLMConfig()" class="btn btn-primary" style="width:100%">保存</button>
      <div id="settings-status" class="status"></div>
    </div>
  </div>
</div>
<script>
async function loadDehydrated() {
  const bookId = getBookId();
  if (!bookId) return alert('没有找到 book_id，请先在首页上传并脱水小说');
  const res = await fetch(`/api/dehydrate/${bookId}/output`);
  if (!res.ok) return alert('脱水版不存在，请先完成脱水');
  const data = await res.json();
  document.getElementById('text-body').textContent = data.text;
  document.getElementById('text-body').style.display = 'block';
}

async function askQuestion() {
  const input = document.getElementById('qa-question');
  const question = input.value.trim();
  if (!question) return;
  const bookId = getBookId();
  if (!bookId) return alert('没有找到 book_id');
  const res = await fetch('/api/qa/ask', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({book_id: bookId, question})
  });
  const data = await res.json();
  const history = document.getElementById('qa-history');
  const item = document.createElement('div');
  item.className = 'qa-item';
  item.innerHTML = `
    <div class="question">${escHtml(question)}</div>
    <div class="answer">${escHtml(data.answer)}</div>
    ${data.source_chapters.length ? `<div class="source">参考章节：${data.source_chapters.join(', ')}</div>` : ''}
  `;
  history.prepend(item);
  input.value = '';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
